name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-type-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.13"

      - name: Install deps
        run: uv sync --extra dev

      - name: Ruff (lint)
        run: uv run ruff check src tests

      - name: Ruff (format check)
        run: uv run ruff format --check src tests

      - name: Mypy (strict)
        run: uv run mypy src

      - name: Pytest
        run: uv run pytest -q

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-type-test
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t idas:ci .
